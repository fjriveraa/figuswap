<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="/favicon.ico" sizes="any">
    <link rel="apple-touch-icon" href="/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png">
    <link rel="icon" type="image/png" sizes="512x512" href="/icon-512.png">
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#0a0f1e">
    <title>FiguSwitch ⚽</title>

    <!-- Específico de Safari/iOS: el nombre que aparece bajo el ícono al "Agregar a inicio"
         NO se toma del <title> de arriba, sino de esta etiqueta — por eso seguía saliendo
         el nombre viejo aunque el título de la pestaña ya estuviera correcto. -->
    <meta name="apple-mobile-web-app-title" content="FiguSwitch">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <!-- Open Graph: esto es lo que WhatsApp/Facebook leen para armar la vista previa del link
         (imagen, título, descripción). Sin esto, al pegar el link no sale nada o sale genérico. -->
    <meta property="og:title" content="FiguSwitch ⚽">
    <meta property="og:description" content="Escanea con IA, encuentra matches reales y completa tu álbum del Mundial 2026.">
    <meta property="og:image" content="https://figuswitch.com/icon-512.png">
    <meta property="og:url" content="https://figuswitch.com">
    <meta property="og:type" content="website">

    <!-- Twitter/X usa sus propias etiquetas, similares pero no idénticas a Open Graph -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="FiguSwitch ⚽">
    <meta name="twitter:description" content="Escanea con IA, encuentra matches reales y completa tu álbum del Mundial 2026.">
    <meta name="twitter:image" content="https://figuswitch.com/icon-512.png">

    <!-- Fix: sin esto, el margen/fondo blanco POR DEFECTO del navegador se asoma en los bordes
         (normalmente unos 8px alrededor de toda la página) — se veía como un borde blanco en
         los costados y arriba, tanto al abrir la app como ya navegando dentro. overscroll-behavior
         evita además que el "rebote" elástico al hacer scroll en iOS/Android revele ese mismo
         blanco por un instante al llegar al final de una lista. -->
    <style>
      html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        min-height: 100%;
        background-color: #0a0f1e;
        overscroll-behavior: none;
      }
      #root {
        min-height: 100vh;
        background-color: #0a0f1e;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      // Registro del service worker — requisito técnico para que Chrome/Android ofrezca
      // "Instalar app". Si falla (navegador viejo, etc.) no rompe nada, solo no se ofrece instalar.
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", () => {
          navigator.serviceWorker.register("/sw.js").catch(() => {});
        });
      }
    </script>
  </body>
</html>
